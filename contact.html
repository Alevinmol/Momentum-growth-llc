<head>

    <link rel="stylesheet" href="css/site.css">
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
</head>

<body>

<nav class="navbar navbar-expand-md navbar-light bg-premium border-bottom sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="img/logo.jpeg" alt="Momentum Growth Logo" class="logo-main">
        <span class="ms-2 fw-bold d-none d-sm-inline">MOMENTUM GROWTH</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav ms-auto mb-2 mb-md-0 align-items-center">
                <li class="nav-item"><a class="nav-link px-3" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="faq.html">FAQ</a></li>
                <li class="nav-item"><a class="nav-link nav-btn active" href="contact.html">Contact us</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="flex-shrink-0">
   <div class="container">
       <h1 class="text-center mb-3">Contact Us</h1>
       <form name="contact" method="POST" data-netlify-recaptcha="true" data-netlify="true">
           <div class="row mb-1">
               <div class="col">
                   <label class="form-label">First Name</label>
                   <input type="text" name="firstName" class="form-control" placeholder="First name"
                       aria-label="First name" required>
               </div>
               <div class="col">
                   <label class="form-label">Last Name</label>
                   <input type="text" name="lastName" class="form-control" placeholder="Last name"
                       aria-label="Last name" required>
               </div>
           </div>
           <div class="row mb-1">
               <div class="col">
                   <label class="form-label">Email</label>
                   <input type="email" name="email" class="form-control" placeholder="Email"
                       aria-label="Email" required>
               </div>
               <div class="col">
                   <label class="form-label">Phone (optional)</label>
                   <input type="text" name="phone" class="form-control" placeholder="Phone"
                       aria-label="Phone">
               </div>
           </div>
           <div class="row mb-1">
               <div class="col">
                   <label class="form-label">Subject</label>
                   <input type="text" name="subject" class="form-control" placeholder="Subject"
                       aria-label="Subject" required>
               </div>
           </div>
           <div class="row mb-1">
               <div class="col">
                   <label class="form-label">Message</label>
                   <textarea type="text" name="message" class="form-control" placeholder="Message"
                       aria-label="Message" required></textarea>
               </div>
           </div>
           <div data-netlify-recaptcha="true"></div>
           <button type="submit" class="btn btn-primary mt-2">Submit</button>
       </form>
   </div>
 <!-- FOOTER -->
  <footer class="py-5 border-top">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
      <div>
        <span class="fw-bold">Momentum Growth LLC</span> <span class="opacity-50">· Cleaning Solutions</span>
      </div>
      <p class="go-birds mb-0">
        go birds 
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/8e/Philadelphia_Eagles_logo.svg/1200px-Philadelphia_Eagles_logo.svg.png" alt="Eagles logo" style="height: 14px;">
      </p>
    </div>
  </footer>
 </main>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"

</body>

</html>
